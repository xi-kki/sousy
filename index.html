<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sousy — Voice Kitchen Assistant</title>
  <meta name="description" content="Sousy — AI sous-chef voice assistant for commercial kitchen inventory. Talk to your walk-in, not a spreadsheet." />
  <meta name="theme-color" content="#FF8C00" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <style>
    @import "tailwindcss";

    :root {
      --bg: #0c0c14;
      --orange: #FF8C00;
      --green: #00D4AA;
      --purple: #6C5CE7;
      --yellow: #FFD93D;
      --text: #f0f0f0;
      --text-dim: rgba(255,255,255,0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter Tight', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      cursor: none;
    }

    @media (max-width: 1024px) {
      body { cursor: auto; }
    }

    /* Custom Cursor */
    .cursor {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      transform: translate(-50%, -50%);
      mix-blend-mode: exclusion;
      width: 48px;
      height: 48px;
      transition: left 0.05s, top 0.05s;
    }

    @media (max-width: 1024px) {
      .cursor { display: none; }
    }

    .cursor svg { width: 100%; height: 100%; }

    /* Logo */
    .logo {
      position: fixed;
      top: 32px;
      left: 32px;
      z-index: 20;
      mix-blend-mode: exclusion;
      pointer-events: none;
    }

    .logo svg { width: 100%; height: auto; }

    @media (max-width: 640px) {
      .logo { width: 124px; top: 16px; left: 16px; }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .logo { width: 266px; }
    }

    @media (min-width: 1025px) {
      .logo { width: 355px; }
    }

    /* Caption */
    .caption {
      position: fixed;
      top: 244px;
      left: 32px;
      z-index: 20;
      mix-blend-mode: exclusion;
      pointer-events: none;
      width: 692px;
      font-weight: 500;
      font-size: 12px;
      line-height: 140%;
      letter-spacing: -0.04em;
      color: #fff;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .caption { top: 118px; left: 16px; width: calc(100vw - 32px); }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .caption { top: 180px; width: calc(50vw - 48px); }
    }

    /* Nav */
    .nav {
      position: fixed;
      top: 32px;
      right: 32px;
      z-index: 20;
      mix-blend-mode: exclusion;
      pointer-events: none;
      width: 330px;
      height: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav span {
      font-weight: 500;
      font-size: 15px;
      text-transform: uppercase;
      color: white;
      letter-spacing: -0.02em;
    }

    .nav-right {
      display: flex;
      gap: 50px;
      align-items: center;
    }

    .hamburger svg { width: 30px; height: 30px; }

    @media (max-width: 640px) {
      .nav { top: 16px; right: 16px; width: auto; }
      .nav span { font-size: 13px; }
      .nav span.desktop-only { display: none; }
      .nav-right { gap: 20px; }
      .hamburger svg { width: 24px; height: 24px; }
    }

    /* Product Info */
    .product-info {
      position: fixed;
      right: 32px;
      bottom: 80px;
      z-index: 20;
      mix-blend-mode: exclusion;
      pointer-events: none;
      width: 330px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
    }

    @media (max-width: 640px) {
      .product-info {
        left: 0;
        right: 0;
        bottom: 48px;
        width: 100%;
        align-items: center;
        text-align: center;
      }
    }

    .product-info .icon-circle {
      width: 30px;
      height: 30px;
      margin-bottom: 32px;
      position: relative;
    }

    @media (max-width: 640px) {
      .product-info .icon-circle { width: 20px; height: 20px; margin-bottom: 12px; }
    }

    .product-info .icon-circle svg { width: 100%; height: 100%; }

    .product-info .icon-circle .symbol {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: white;
      font-weight: 500;
      font-family: 'Inter Tight', sans-serif;
      letter-spacing: -0.04em;
    }

    @media (max-width: 640px) {
      .product-info .icon-circle .symbol { font-size: 10px; }
    }

    .product-info .label {
      font-weight: 500;
      font-size: 30px;
      line-height: 100%;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: white;
      margin-bottom: 32px;
      text-align: center;
    }

    @media (max-width: 640px) {
      .product-info .label { font-size: 20px; margin-bottom: 12px; width: 252px; }
    }

    .product-info .price {
      font-weight: 500;
      font-size: 80px;
      line-height: 100%;
      letter-spacing: -0.04em;
      color: white;
    }

    @media (max-width: 640px) {
      .product-info .price { font-size: 60px; }
    }

    /* View Button */
    .view-btn {
      position: fixed;
      right: 32px;
      bottom: 32px;
      z-index: 20;
      mix-blend-mode: exclusion;
      pointer-events: none;
      width: 330px;
      height: 174px;
      background: #fff;
      border-radius: 1335px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: right bottom;
      transform: scale(0);
      opacity: 0;
      cursor: pointer;
      pointer-events: auto;
    }

    @media (max-width: 640px) {
      .view-btn {
        left: 16px;
        right: 16px;
        bottom: 60px;
        width: auto;
        height: 100px;
        transform-origin: center bottom;
      }
    }

    .view-btn span {
      font-weight: 500;
      font-size: 110px;
      letter-spacing: -0.04em;
      color: #fff;
      mix-blend-mode: exclusion;
    }

    @media (max-width: 640px) {
      .view-btn span { font-size: 72px; }
    }

    /* Video Container */
    .video-container {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .video-container {
        top: 220px;
        height: calc(100vh - 220px);
      }
    }

    .video-container video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-left { display: none; }

    /* White Overlay */
    .white-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 12;
    }

    /* Footer */
    .footer {
      position: fixed;
      left: 16px;
      bottom: 32px;
      z-index: 20;
      mix-blend-mode: exclusion;
      pointer-events: none;
      display: flex;
      gap: 80px;
      opacity: 0;
    }

    @media (max-width: 640px) {
      .footer { bottom: 24px; gap: 0; width: calc(100% - 32px); justify-content: space-between; }
    }

    .footer span {
      font-weight: 500;
      font-size: 13px;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    @media (max-width: 640px) {
      .footer span { font-size: 11px; }
    }

    /* Gallery Panel */
    .gallery-panel {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10;
      transform: translateY(100vh);
      overflow-y: auto;
      scrollbar-width: none;
    }

    .gallery-panel::-webkit-scrollbar { display: none; }

    .gallery-inner {
      width: 100%;
      padding-top: min(400px, 40vh);
      padding-bottom: 20vh;
    }

    .gallery-title {
      font-weight: 500;
      font-size: 48px;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      margin-bottom: 48px;
      padding: 0 32px;
    }

    @media (max-width: 640px) {
      .gallery-title { font-size: 24px; margin-bottom: 16px; padding: 0 12px; }
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 0 32px;
    }

    @media (max-width: 640px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 0 12px; }
    }

    @media (min-width: 641px) and (max-width: 1024px) {
      .gallery-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .bp-card {
      aspect-ratio: 2/3;
      overflow: hidden;
      background: #1a1a2e;
      border-radius: 8px;
      transform: scale(0);
      will-change: transform;
    }

    .bp-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scanlines */
    .scanlines::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    @media (prefers-reduced-motion: reduce) {
      .scanlines::after { display: none; }
      .bp-card { will-change: auto; }
    }

    /* Entry Animations */
    .animate-in {
      opacity: 0;
      transform: translateY(12px);
    }

    @media (prefers-reduced-motion: reduce) {
      .animate-in { opacity: 1; transform: none; }
    }
  </style>
</head>

  <!-- Video Container -->
  <div class="video-container" id="main-canvas">
    <video class="video-left" id="videoLeft" muted playsinline preload="auto"

  <!-- Gallery Panel -->
  <div class="gallery-panel" id="galleryPanel">

  </div>

  <script>
    const GALLERY_IMAGES = [
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_104530_521b2f85-c0f3-4d0e-9704-b578315b4cb9.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103711_76ccdb8b-5043-4f47-9c54-4379713393ea.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103728_394f6a1b-85e2-4386-a4f6-408472a0a5b7.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103739_86743e0e-16a7-4bee-bf38-dd67985344dc.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103748_b2215dc8-a3a7-470d-b19a-5b87fa7d0c37.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103758_e919ce72-5c9d-4b87-9be6-d7647b34825c.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103808_013583d0-3386-4547-9832-37c7d8edb3ac.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103937_a0c49d0a-33eb-4ead-aea6-c1baf241acbc.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_103956_d18ed8fd-7b6f-4b86-91f9-20010fe38670.png&w=1920&q=85',
      'https://images.higgs.ai/?default=1&output=webp&url=https%3A%2F%2Fd8j0ntlcm91z4.cloudfront.net%2Fuser_38xzZboKViGWJOttwIXH07lWA1P%2Fhf_20260629_104034_ba5a9963-87ff-4008-a545-6bd686c088b5.png&w=1920&q=85',
    ];

    const symbols = ['8', '$', '^^', '%', '/'];
    let mousePos = { x: 0, y: 0 };
    let scrollY = 0;
    let lastSymbolChange = 0;
    const vh = window.innerHeight;
    const isTouch = 'ontouchstart' in window;

    // Build gallery grid with layout algorithm
    function getCols() {
      if (window.innerWidth >= 1024) return 4;
      if (window.innerWidth >= 640) return 3;
      return 2;
    }

    function buildLayout(count, cols) {
      const rows = Math.ceil(count / cols);
      const grid = [];
      for (let r = 0; r < rows; r++) {
        const row = new Array(cols).fill(-1);
        const a = (r * 2 + (r % 2)) % cols;
        row[a] = (r * cols + a) % count;
        if (r % 3 === 0) {
          let b = (a + 2) % cols;
          if (b === a) b = (a + 1) % cols;
          row[b] = (r * cols + b) % count;
        }
        grid.push(row);
      }
      return grid;
    }

    function buildGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      const cols = getCols();
      const layout = buildLayout(GALLERY_IMAGES.length, cols);

      layout.forEach((row, r) => {
        row.forEach((imgIdx, c) => {
          const card = document.createElement('div');
          card.className = 'bp-card';
          if (imgIdx >= 0) {
            card.innerHTML = `<img src="${GALLERY_IMAGES[imgIdx]}" alt="Sousy dashboard ${imgIdx + 1}" loading="lazy">`;
          }
          card.dataset.originX = c < cols / 2 ? 'right bottom' : 'left bottom';
          card.style.transformOrigin = card.dataset.originX;
          grid.appendChild(card);
        });
      });
    }
    buildGallery();
    window.addEventListener('resize', buildGallery);

    // Cursor tracking
    if (!isTouch) {
      document.addEventListener('mousemove', (e) => {
        mousePos = { x: e.clientX, y: e.clientY };
        const cursor = document.getElementById('cursor');
        cursor.style.left = `${e.clientX}px`;
        cursor.style.top = `${e.clientY}px`;
      });
    }

    // Video scrubbing (desktop)
    const videoLeft = document.getElementById('videoLeft');
    const videoRight = document.getElementById('videoRight');
    let activeSideRef = 'right';

    function scrubVideos() {
      if (isTouch || scrollY >= vh) return;

      const width = window.innerWidth;
      const deadZone = Math.max(30, width * 0.05);
      const centerX = width / 2;
      const x = mousePos.x;

      if (x < centerX - deadZone) {
        videoLeft.style.display = 'none';
        videoRight.style.display = 'block';
        if (activeSideRef !== 'right') {
          videoRight.currentTime = 0;
          activeSideRef = 'right';
        }
        const range = centerX - deadZone;
        const dist = centerX - deadZone - x;
        const progress = Math.min(1, Math.max(0, dist / range));
        if (videoRight.duration && !videoRight.seeking) {
          videoRight.currentTime = progress * videoRight.duration;
        }
      } else if (x > centerX + deadZone) {
        videoLeft.style.display = 'block';
        videoRight.style.display = 'none';
        if (activeSideRef !== 'left') {
          videoLeft.currentTime = 0;
          activeSideRef = 'left';
        }
        const range = width - (centerX + deadZone);
        const dist = x - (centerX + deadZone);
        const progress = Math.min(1, Math.max(0, dist / range));
        if (videoLeft.duration && !videoLeft.seeking) {
          videoLeft.currentTime = progress * videoLeft.duration;
        }
      }
    }

    // Touch video autoplay
    if (isTouch) {
      videoRight.play().catch(() => {});
      videoRight.onended = () => {
        videoLeft.play().catch(() => {});
        videoLeft.onended = () => {
          videoRight.play().catch(() => {});
        };
      };
    }

    // RAF-based scroll animation
    const galleryPanel = document.getElementById('galleryPanel');
    const galleryInner = document.getElementById('galleryInner');
    const whiteOverlay = document.getElementById('white-overlay');
    const circleSymbol = document.getElementById('circle-symbol');
    const mainCanvas = document.getElementById('main-canvas');
    const outroInfo = document.querySelector('.product-info');
    const viewBtn = document.getElementById('view-btn');
    const footer = document.getElementById('footer');
    const outroOffset = parseInt(outroInfo?.dataset?.outroOffset || '166');

    let maxScroll = 0;
    let spacerHeight = vh;

    function updateSpacerHeight() {
      if (galleryInner) {
        maxScroll = galleryInner.scrollHeight - vh;
        spacerHeight = vh + maxScroll + 2 * vh;
        document.getElementById('scroll-spacer')?.style && (document.getElementById('scroll-spacer').style.height = spacerHeight + 'px');
      }
    }
    updateSpacerHeight();
    window.addEventListener('resize', updateSpacerHeight);

    function rafScroll() {
      scrollY = window.scrollY;

      // Scrub videos
      scrubVideos();

      // Phase 1: Panel slides up (0 to vh)
      if (scrollY <= vh) {
        const panelProgress = Math.min(1, scrollY / vh);
        galleryPanel.style.transform = `translateY(${(1 - panelProgress) * 100}vh)`;
        mainCanvas.style.opacity = scrollY > vh ? '0' : '1';
      } else {
        galleryPanel.style.transform = 'translateY(0)';
        mainCanvas.style.opacity = '0';
      }

      // Phase 2: Inner wrapper translates up
      if (scrollY > vh && galleryInner) {
        const translate = -(scrollY - vh);
        galleryInner.style.transform = `translateY(${translate}px)`;
      } else if (galleryInner) {
        galleryInner.style.transform = 'translateY(0)';
      }

      // Card reveal
      const cards = document.querySelectorAll('.bp-card');
      const panelOffset = scrollY <= vh ? vh - scrollY : 0;
      cards.forEach((card) => {
        const rect = card.getBoundingClientRect();
        const adjustedTop = rect.top + (scrollY <= vh ? 0 : 0);
        const adjustedBottom = rect.bottom;

        if (adjustedBottom <= 0 || adjustedTop >= vh) {
          card.style.transform = 'scale(0)';
          return;
        }

        const enter = Math.min(1, (vh - adjustedTop) / (vh * 0.6));
        const exit = Math.min(1, adjustedBottom / (vh * 0.4));
        const scale = Math.min(enter, exit);

        if (scale > 0.01) {
          card.style.transform = `scale(${scale})`;
        } else {
          card.style.transform = 'scale(0)';
        }
      });

      // Outro phase
      if (scrollY > vh + maxScroll && maxScroll > 0) {
        const progress = Math.min(1, (scrollY - vh - maxScroll) / (vh - 100));
        whiteOverlay.style.opacity = String(progress);
        outroInfo.style.transform = `translateY(-${progress * outroOffset}px)`;
        viewBtn.style.transform = `scale(${progress})`;
        viewBtn.style.opacity = String(progress);
        footer.style.opacity = String(progress > 0.1 ? 1 : 0);
      } else {
        viewBtn.style.transform = 'scale(0)';
        viewBtn.style.opacity = '0';
        footer.style.opacity = '0';
        whiteOverlay.style.opacity = '0';
        outroInfo.style.transform = 'translateY(0)';
      }

      // Circle symbol randomization (throttled 80ms)
      const now = Date.now();
      if (now - lastSymbolChange > 80 && scrollY > 50) {
        circleSymbol.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        lastSymbolChange = now;
      }

      requestAnimationFrame(rafScroll);
    }

    // Entry animations
    function animateEntries() {
      const anims = document.querySelectorAll('.animate-in');
      anims.forEach((el) => {
        const delay = parseFloat(el.dataset.delay || '0');
        gsap.to(el, {
          opacity: 1,
          y: 0,
          duration: 0.6,
          delay: delay,
          ease: [0.25, 0.1, 0.25, 1]
        });
      });
    }

    // Init
    requestAnimationFrame(rafScroll);
    animateEntries();

    // Respect reduced motion
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('.bp-card').forEach(card => {
        card.style.transform = 'scale(1)';
      });
    }
  </script>
</body>
</html>
